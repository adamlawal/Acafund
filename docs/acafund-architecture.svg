<svg width="1440" height="960" viewBox="0 0 1440 960" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1440" height="960" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="66" font-size="34" font-weight="700" fill="#0f172a">AcaFund -- Architecture &amp; Money Flow</text>
  <text x="60" y="98" font-size="17" fill="#64748b">Financial operating system for African student communities · custodial model with manual, verifiable payouts</text>

  <!-- Legend -->
  <g font-size="14" fill="#334155">
    <rect x="1010" y="46" width="18" height="12" rx="3" fill="#16a34a"/>
    <text x="1036" y="57">Money in</text>
    <rect x="1130" y="46" width="18" height="12" rx="3" fill="#d97706"/>
    <text x="1156" y="57">Money out (manual)</text>
    <rect x="1010" y="72" width="18" height="12" rx="3" fill="#6366f1"/>
    <text x="1036" y="83">App request / data</text>
  </g>

  <!-- ===================== USERS ===================== -->
  <g>
    <rect x="60" y="150" width="280" height="150" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="80" y="182" font-size="18" font-weight="700" fill="#0f172a">Users</text>
    <text x="80" y="212" font-size="15" fill="#334155">• Student -- pays dues, donates</text>
    <text x="80" y="238" font-size="15" fill="#334155">• Course Rep / Admin -- collections,</text>
    <text x="98" y="258" font-size="15" fill="#334155">expense approval, mark paid out</text>
    <text x="80" y="284" font-size="15" fill="#334155">• Auditor -- approves expenses</text>
  </g>

  <!-- ===================== FRONTEND ===================== -->
  <g>
    <rect x="60" y="360" width="280" height="240" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="392" font-size="18" font-weight="700" fill="#3730a3">Frontend</text>
    <text x="80" y="416" font-size="13" fill="#4f46e5">React · TypeScript · Vite · Tailwind · Vercel</text>
    <line x1="80" y1="430" x2="320" y2="430" stroke="#c7d2fe" stroke-width="1"/>
    <text x="80" y="454" font-size="14" fill="#334155">Community Home · Collections</text>
    <text x="80" y="478" font-size="14" fill="#334155">Contribution / Checkout page</text>
    <text x="80" y="502" font-size="14" fill="#334155">Direct-transfer account card</text>
    <text x="80" y="526" font-size="14" fill="#334155">Expenses (3-state) · Approval</text>
    <text x="80" y="550" font-size="14" fill="#334155">Transparency Report (public)</text>
    <text x="80" y="574" font-size="14" fill="#334155">Treasury AI Assistant</text>
  </g>

  <!-- ===================== BACKEND ===================== -->
  <g>
    <rect x="470" y="150" width="360" height="450" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="1.8"/>
    <text x="492" y="182" font-size="18" font-weight="700" fill="#0f172a">Backend API</text>
    <text x="492" y="206" font-size="13" fill="#475569">Python · FastAPI · SQLAlchemy · Render</text>

    <!-- routers -->
    <rect x="492" y="224" width="316" height="150" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="508" y="248" font-size="14" font-weight="700" fill="#334155">Routers</text>
    <text x="508" y="272" font-size="13" fill="#475569">auth · communities · collections</text>
    <text x="508" y="294" font-size="13" fill="#475569">payments · webhooks · expenses</text>
    <text x="508" y="316" font-size="13" fill="#475569">reserved-account · reports · assistant</text>
    <text x="508" y="344" font-size="12.5" fill="#64748b">Verify-before-credit · webhook HMAC ·</text>
    <text x="508" y="362" font-size="12.5" fill="#64748b">role gating (admin / treasurer / auditor)</text>

    <!-- services -->
    <rect x="492" y="386" width="316" height="86" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="508" y="410" font-size="14" font-weight="700" fill="#334155">Services</text>
    <text x="508" y="434" font-size="13" fill="#475569">MonnifyService · Ledger (credit/debit)</text>
    <text x="508" y="456" font-size="13" fill="#475569">AI treasury assistant</text>

    <!-- db -->
    <rect x="492" y="484" width="316" height="96" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="508" y="508" font-size="14" font-weight="700" fill="#334155">PostgreSQL</text>
    <text x="508" y="532" font-size="13" fill="#475569">users · communities · collections</text>
    <text x="508" y="552" font-size="13" fill="#475569">payments · expenses · ledger entries</text>
    <text x="508" y="572" font-size="12.5" fill="#64748b">ledger = source of truth for transparency</text>
  </g>

  <!-- ===================== MONNIFY ===================== -->
  <g>
    <rect x="960" y="150" width="420" height="300" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.8"/>
    <text x="982" y="182" font-size="18" font-weight="700" fill="#166534">Monnify (payment gateway)</text>

    <rect x="982" y="200" width="376" height="70" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="998" y="224" font-size="14" font-weight="700" fill="#15803d">Checkout API</text>
    <text x="998" y="246" font-size="12.5" fill="#475569">init-transaction to hosted checkout</text>
    <text x="998" y="263" font-size="12.5" fill="#475569">(card · USSD · transfer) -- dues flow</text>

    <rect x="982" y="282" width="376" height="70" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="998" y="306" font-size="14" font-weight="700" fill="#15803d">Customer Reserved Account</text>
    <text x="998" y="328" font-size="12.5" fill="#475569">per-community virtual account number</text>
    <text x="998" y="345" font-size="12.5" fill="#475569">for direct transfers &amp; donations</text>

    <rect x="982" y="364" width="182" height="66" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="998" y="388" font-size="13.5" font-weight="700" fill="#15803d">Verify Transactions</text>
    <text x="998" y="410" font-size="12" fill="#475569">server-side confirm</text>

    <rect x="1176" y="364" width="182" height="66" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="1192" y="388" font-size="13.5" font-weight="700" fill="#15803d">Webhooks</text>
    <text x="1192" y="410" font-size="12" fill="#475569">payment events (HMAC)</text>
  </g>

  <!-- ===================== NVIDIA NEMOTRON ===================== -->
  <g>
    <rect x="960" y="486" width="420" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="982" y="518" font-size="17" font-weight="700" fill="#166534">NVIDIA Nemotron</text>
    <text x="982" y="544" font-size="13" fill="#475569">Treasury assistant -- natural-language Q&amp;A</text>
    <text x="982" y="563" font-size="13" fill="#475569">over the community's ledger &amp; collections</text>
  </g>

  <!-- ===================== MANUAL PAYOUT CALLOUT ===================== -->
  <g>
    <rect x="470" y="640" width="910" height="150" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
    <text x="492" y="672" font-size="18" font-weight="700" fill="#b45309">Money-out is manual &amp; verifiable -- by design</text>
    <text x="492" y="700" font-size="14" fill="#334155">Expense lifecycle:  <tspan font-weight="700" fill="#64748b">Pending Approval</tspan>  to  <tspan font-weight="700" fill="#2563eb">Approved · Payout Pending</tspan>  to  <tspan font-weight="700" fill="#15803d">Paid Out (with reference)</tspan></text>
    <text x="492" y="728" font-size="14" fill="#334155">A human sends the funds, then records the payout reference. The ledger is debited only at <tspan font-weight="700">Paid Out</tspan> -- never at approval.</text>
    <text x="492" y="754" font-size="13.5" fill="#92400e">No Transfers / Disbursement API: Monnify requires email OTP on every real transfer, so payouts are not auto-initiated.</text>
    <text x="492" y="776" font-size="13.5" fill="#92400e">This keeps "approved" from ever implying money moved -- the core accountability guarantee.</text>
  </g>

  <!-- ===================== ARROWS ===================== -->
  <defs>
    <marker id="ind" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6366f1"/></marker>
    <marker id="grn" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/></marker>
    <marker id="amb" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d97706"/></marker>
  </defs>

  <!-- user -> frontend -->
  <line x1="200" y1="300" x2="200" y2="356" stroke="#6366f1" stroke-width="2" marker-end="url(#ind)"/>

  <!-- frontend <-> backend -->
  <line x1="340" y1="452" x2="466" y2="360" stroke="#6366f1" stroke-width="2" marker-end="url(#ind)"/>
  <line x1="466" y1="410" x2="340" y2="500" stroke="#6366f1" stroke-width="2" marker-end="url(#ind)"/>

  <!-- backend -> monnify (checkout init) money in -->
  <line x1="830" y1="250" x2="956" y2="235" stroke="#16a34a" stroke-width="2.5" marker-end="url(#grn)"/>
  <text x="838" y="228" font-size="12" fill="#15803d" font-weight="600">init / verify</text>

  <!-- monnify -> backend (webhook) money in -->
  <line x1="956" y1="397" x2="832" y2="320" stroke="#16a34a" stroke-width="2.5" marker-end="url(#grn)"/>
  <text x="838" y="360" font-size="12" fill="#15803d" font-weight="600">webhook to</text>

  <!-- backend <-> nvidia nemotron -->
  <line x1="830" y1="430" x2="956" y2="520" stroke="#6366f1" stroke-width="2" marker-end="url(#ind)"/>

  <!-- manual payout arrow (amber, dashed) from backend down to callout -->
  <line x1="650" y1="600" x2="650" y2="636" stroke="#d97706" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#amb)"/>

  <!-- footer -->
  <text x="60" y="900" font-size="13" fill="#94a3b8">Money in (green): Checkout + Reserved Account settle to the merchant wallet, every payment re-verified server-side before it is marked paid.</text>
  <text x="60" y="922" font-size="13" fill="#94a3b8">Money out (amber): approved expenses are paid by a human and logged with a reference -- the ledger and public report update only then.</text>
</svg>
