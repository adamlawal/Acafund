## AcaFund – Render deployment manifest
## Apply via: Render Dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: acafund-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: starter          # upgrade to standard for production SLAs

    envVars:
      ## ── Database (wired automatically from the managed DB below) ──
      - key: DATABASE_URL
        fromDatabase:
          name: acafund-db
          property: connectionString

      ## ── App secrets (Render auto-generates SECRET_KEY) ──
      - key: SECRET_KEY
        generateValue: true

      ## ── Monnify ──
      ## ⚠️  Currently pointing at the SANDBOX. Change MONNIFY_BASE_URL to
      ##     https://api.monnify.com and swap in production credentials when
      ##     you go live.  Do NOT flip this switch on the sandbox contract code.
      - key: MONNIFY_BASE_URL
        value: https://sandbox.monnify.com   # ← swap to https://api.monnify.com for production
      - key: MONNIFY_API_KEY
        sync: false        # enter in Render dashboard — never commit
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false

      ## ── NVIDIA Nemotron (AI Assistant) ──
      - key: NVIDIA_API_KEY
        sync: false

      ## ── CORS ──
      ## Set to your deployed frontend URL, e.g. https://acafund.vercel.app
      - key: FRONTEND_ORIGIN
        sync: false

databases:
  - name: acafund-db
    plan: free             # upgrade to starter/standard for production
    databaseName: acafund
    user: acafund
